<div class="bg-black overflow-hidden" id="clients-container">
    <div class="container py-16 md:py-20">
      <div class="mx-auto w-full">
        <h2 class="text-center font-header text-4xl font-semibold uppercase text-primary sm:text-5xl lg:text-6xl">
          {{'clients.title-client'|translate}}
        </h2>
      </div>
    </div>
    <div class="relative w-full overflow-hidden pt-4 pb-16">
      <!-- Fade edges -->
      <div class="pointer-events-none absolute inset-y-0 left-0 z-10 w-12 bg-gradient-to-r from-black to-transparent sm:w-24"></div>
      <div class="pointer-events-none absolute inset-y-0 right-0 z-10 w-12 bg-gradient-to-l from-black to-transparent sm:w-24"></div>
      <!-- Marquee track -->
      <div class="clients-marquee items-center gap-8 sm:gap-16">
        <ng-container *ngFor="let company of companiesList">
          <span class="inline-flex shrink-0 items-center px-3 sm:px-4">
            <img [src]="company.logo" [alt]="company.name + '-logo'" class="h-8 w-auto grayscale-logo sm:h-10 md:h-12" />
          </span>
        </ng-container>
        <!-- Duplicated for seamless loop -->
        <ng-container *ngFor="let company of companiesList">
          <span class="inline-flex shrink-0 items-center px-3 sm:px-4">
            <img [src]="company.logo" [alt]="company.name + '-logo'" class="h-8 w-auto grayscale-logo sm:h-10 md:h-12" />
          </span>
        </ng-container>
      </div>
    </div>
  </div>
